<!DOCTYPE html>
<html>
<head>
<title>Cart App</title>
</head>

<body>

<h2>Auto Scaling Cart App</h2>

<button onclick="addProduct()">Add Product</button>
<button onclick="stressTest()">Click 10 Times</button>

<p id="result"></p>

<script>

function addProduct(){

fetch("/add", {
method: "POST"
})
.then(res => res.json())
.then(data => {

document.getElementById("result").innerText =
"Cart Items: " + data.cart_count

})

}

function stressTest(){

for(let i=0;i<10;i++){
addProduct()
}

}

</script>

</body>
</html>
